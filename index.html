<canvas id="canvas"></canvas>

<!-- HUD Overlay -->
<div class="hud">
  <!-- Layer title (appears during transitions) -->
  <div class="layer-title" id="layerTitle">
    <span class="layer-number" id="layerNumber"></span>
    <h1 class="layer-name" id="layerName"></h1>
    <p class="layer-subtitle" id="layerSubtitle"></p>
  </div>

  <!-- Teaching panel -->
  <div class="teaching-panel" id="teachingPanel">
    <div class="teaching-inner" id="teachingInner"></div>
  </div>

  <!-- Navigation -->
  <div class="nav-controls">
    <button class="nav-btn" id="btnPrev" aria-label="Previous layer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 15l-6-6-6 6"/></svg>
      <span class="nav-label">inward</span>
    </button>
    <div class="layer-indicator" id="layerIndicator">
      <div class="layer-dots" id="layerDots"></div>
    </div>
    <button class="nav-btn" id="btnNext" aria-label="Next layer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg>
      <span class="nav-label">outward</span>
    </button>
  </div>

  <!-- Breath indicator -->
  <div class="breath" id="breath">
    <span class="breath-word">breathe</span>
  </div>

  <!-- Welcome overlay -->
  <div class="welcome" id="welcome">
    <h1 class="welcome-title">The Fractal Mandala</h1>
    <p class="welcome-sub">of Presence &amp; Liberation</p>
    <p class="welcome-instruction">scroll or use arrow keys to move through the layers</p>
    <button class="enter-btn" id="enterBtn">enter the mandala</button>
  </div>
