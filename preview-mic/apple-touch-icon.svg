<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="0" fill="#06050a"/>
  <defs>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e0b0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c8b88a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8a7440" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#c8b88a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8b88a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer ring - bold -->
  <circle cx="90" cy="90" r="78" fill="none" stroke="url(#cg)" stroke-width="2.5" opacity="0.85"/>
  <!-- Middle ring -->
  <circle cx="90" cy="90" r="55" fill="none" stroke="url(#cg)" stroke-width="2.2" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="90" cy="90" r="34" fill="none" stroke="url(#cg)" stroke-width="1.8" opacity="0.6"/>
  <!-- Core glow -->
  <circle cx="90" cy="90" r="18" fill="url(#core)"/>
  <!-- Core bright center -->
  <circle cx="90" cy="90" r="7" fill="#f0e0b0" opacity="0.9"/>
  <!-- Subtle cross-hairs for sacred geometry feel -->
  <line x1="90" y1="12" x2="90" y2="168" stroke="#c8b88a" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="90" x2="168" y2="90" stroke="#c8b88a" stroke-width="0.5" opacity="0.15"/>
  <!-- Diagonal sacred geometry lines -->
  <line x1="28" y1="28" x2="152" y2="152" stroke="#c8b88a" stroke-width="0.4" opacity="0.1"/>
  <line x1="152" y1="28" x2="28" y2="152" stroke="#c8b88a" stroke-width="0.4" opacity="0.1"/>
</svg>
